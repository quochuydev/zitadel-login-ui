name: release

# Manual trigger only: GitHub → Actions → release → "Run workflow".
on:
  workflow_dispatch:

permissions:
  contents: write # create the git tag + GitHub Release
  packages: write # push the image to GitHub Packages (ghcr.io)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Version is derived automatically — nothing to type when clicking run.
      # github.run_number increments on every workflow run.
      - name: Compute version
        id: version
        run: echo "version=v1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Compute image names
        id: image
        run: echo "ghcr=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (Docker Hub + GitHub Packages)
        uses: docker/build-push-action@v6
        with:
          context: ./login
          file: ./docker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/zitadel-login-ui:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/zitadel-login-ui:${{ steps.version.outputs.version }}
            ${{ steps.image.outputs.ghcr }}:latest
            ${{ steps.image.outputs.ghcr }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.version.outputs.version }}" --generate-notes
